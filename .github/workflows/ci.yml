name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  boundary:
    name: Boundary and source-quality checks
    runs-on: windows-2022
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Run boundary checker
        shell: pwsh
        run: .\tools\verify_boundaries.ps1 -Root $PWD
      - name: Run boundary regression tests
        shell: pwsh
        run: .\tests\verify_boundaries_tests.ps1 -ScriptPath .\tools\verify_boundaries.ps1

  build:
    needs: boundary
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: x64-debug
            os: windows-2022
            experimental: false
          - preset: x64-release
            os: windows-2022
            experimental: false
          - preset: arm64-debug
            os: windows-11-arm
            experimental: true
          - preset: clangcl-debug
            os: windows-2022
            cc: clangcl
            experimental: false
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test
        run: ctest --preset ${{ matrix.preset }}
